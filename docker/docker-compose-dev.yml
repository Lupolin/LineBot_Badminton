version: '3.8'
services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318"   # OTLP HTTP 接收點
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=teamnova
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=TeamNova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # 資料持久化，重啟後資料不會消失

volumes:
  postgres_data:
